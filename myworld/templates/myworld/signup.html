{% extends 'myworld/base.html' %}

{% block title %}Sign Up - MyWorld{% endblock %}

{% block content %}
<div class="container d-flex align-items-center justify-content-center" style="min-height: 70vh;">
    <div class="glass-card p-5 w-100" style="max-width: 450px;">
        <h2 class="fw-800 text-white text-center mb-4"><i class="bi bi-person-plus-fill me-2 text-primary"></i>Create Account</h2>
        
        <form action="{% url 'signup' %}" method="POST">
            {% csrf_token %}
            
            {% for field in form %}
                <div class="mb-3">
                    <label for="{{ field.id_for_label }}" class="form-label text-white fw-600">{{ field.label }}</label>
                    <input type="{% if 'password' in field.name %}password{% else %}text{% endif %}" name="{{ field.html_name }}" id="{{ field.id_for_label }}" class="form-control glass-input" placeholder="Enter {{ field.label|lower }}" required>
                    {% if field.help_text %}
                        <div class="form-text text-muted" style="font-size: 0.75rem;">{{ field.help_text }}</div>
                    {% endif %}
                </div>
            {% endfor %}
            
            <button type="submit" class="btn btn-primary-custom w-100 py-3 mt-3">Register</button>
        </form>
        
        <div class="text-center mt-4">
            <span class="text-muted">Already registered? </span>
            <a href="{% url 'login' %}" class="fw-600 text-decoration-none" style="color: var(--accent-color);">Login</a>
        </div>
    </div>
</div>
{% endblock %}
